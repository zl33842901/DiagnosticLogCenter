syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.xliad.diagnosticlogcenter.grpc";
option java_outer_classname = "DiaglogProto";

package diaglog;

service Diagloger {
  rpc PostLog (LogDto) returns (LogReply);
}

message LogDtoItem {
  string EnvironmentName = 1;
  string ClientName = 2;
  int64 HappenTime = 3;
  string Message = 4;
  string StackTrace = 5;
  int32 Level = 6;
  string GroupGuid = 7;
  int32 LogType = 8;
  string ClassName = 9;
  string MethodName = 10;
  string Ip = 11;
  int32 StatuCode = 12;
  string DataSource = 13;
  string Database = 14;
  string CommandText = 15;
  string Parameters = 16;
  string PageId = 17;
  string TraceId = 18;
  string ParentGuid = 19;
  string HttpId = 20;
  string ParentHttpId = 21;
}

message LogDto {
  repeated LogDtoItem Items = 1;
}

message LogReply {
  bool success = 1;
  string message = 2;
}